<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEKHON LOVELY - Premium Music Hub</title>
    <style>
        :root {
            --neon-cyan: #00ffcc;
            --neon-pink: #ff007f;
            --bg-black: #06060c;
            --card-bg: rgba(19, 19, 36, 0.75);
            --btn-bg: #1a1a2e;
            --text-white: #ffffff;
            --text-gray: #7e7e9a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background: radial-gradient(circle at center, #111125 0%, var(--bg-black) 100%); 
            color: var(--text-white); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px;
        }

        .player-wrapper {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7), 0 0 20px rgba(0, 255, 204, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
        }

        .brand-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .brand-header h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(to right, var(--neon-cyan), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }

        .brand-header p {
            font-size: 11px;
            color: var(--text-gray);
            text-transform: uppercase;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        /* The Custom Stream Embed Container */
        .embed-container {
            width: 100%;
            height: 166px; /* Optimized for SoundCloud standard custom track panel */
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.15);
            margin-bottom: 25px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--neon-pink);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            text-align: left;
        }

        /* Smart Grid for Audience Action */
        .grid-channels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .channel-card {
            background: var(--btn-bg);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 14px;
            border-radius: 14px;
            cursor: pointer;
            text-align: left;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .channel-card:hover {
            background: linear-gradient(135deg, rgba(0, 255, 204, 0.1), rgba(255, 0, 127, 0.05));
            border-color: var(--neon-cyan);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.1);
        }

        .channel-card strong {
            display: block;
            font-size: 14px;
            color: var(--text-white);
            margin-bottom: 2px;
        }

        .channel-card span {
            font-size: 11px;
            color: var(--text-gray);
        }

        .active-dot {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 6px;
            height: 6px;
            background: var(--neon-cyan);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--neon-cyan);
            display: none;
        }

        .channel-card.active .active-dot {
            display: block;
        }
        
        .channel-card.active {
            border-color: var(--neon-pink);
            background: rgba(255, 0, 127, 0.08);
        }
    </style>
</head>
<body>

<div class="player-wrapper">
    <div class="brand-header">
        <h1>Lovely Beat v2</h1>
        <p>Premium Audio Platform</p>
    </div>

    <div class="embed-container">
        <iframe id="audioEngine" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/499311144&color=%2300ffcc&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false"></iframe>
    </div>

    <div class="section-title">Select Premium Station</div>
    
    <div class="grid-channels">
        <div class="channel-card active" onclick="switchStation(this, 'https://api.soundcloud.com/tracks/499311144')">
            <strong>🎵 Punjabi Top 20</strong>
            <span>Trending Tracks</span>
            <div class="active-dot"></div>
        </div>
        
        <div class="channel-card" onclick="switchStation(this, 'https://api.soundcloud.com/tracks/297372224')">
            <strong>💥 Bhojpuri Club</strong>
            <span>Nonstop Bass Drop</span>
            <div class="active-dot"></div>
        </div>

        <div class="channel-card" onclick="switchStation(this, 'https://api.soundcloud.com/tracks/1283856112')">
            <strong>🔥 Haryanvi Vibes</strong>
            <span>Desi Heavy Beats</span>
            <div class="active-dot"></div>
        </div>

        <div class="channel-card" onclick="switchStation(this, 'https://api.soundcloud.com/tracks/640167093')">
            <strong>❤️ Bollywood Chill</strong>
            <span>Lo-Fi Romantic</span>
            <div class="active-dot"></div>
        </div>
    </div>
</div>

<script>
    function switchStation(element, trackApiUrl) {
        // Remove active state from all cards
        const cards = document.querySelectorAll('.channel-card');
        cards.forEach(card => card.classList.remove('active'));
        
        // Add active state to clicked card
        element.classList.add('active');
        
        // Update SoundCloud Player Engine smoothly with Cyan Theme Accent
        const engine = document.getElementById('audioEngine');
        const encodedUrl = encodeURIComponent(trackApiUrl);
        
        engine.src = `https://w.soundcloud.com/player/?url=${encodedUrl}&color=%2300ffcc&auto_play=true&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false`;
    }
</script>

</body>
</html>
