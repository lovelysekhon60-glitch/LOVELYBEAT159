<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVELY BEAT</title>
    <style>
        :root {
            --primary: #00ffcc;
            --bg-dark: #0a0a12;
            --card-bg: #131324;
            --text-main: #ffffff;
            --text-dim: #8b8ba7;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; background: var(--card-bg); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); }
        h1 { font-size: 24px; text-align: center; margin-bottom: 20px; color: var(--primary); letter-spacing: 1px; text-transform: uppercase; }
        .player-box { width: 100%; height: 220px; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 20px; border: 2px solid var(--primary); position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: #0a0a12; color: #fff; font-size: 15px; outline: none; }
        input:focus { border-color: var(--primary); }
        button { background: var(--primary); color: #000; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; box-shadow: 0 0 10px var(--primary); }
        .status-text { text-align: center; font-size: 14px; color: var(--text-dim); margin-top: 5px; }
        .info-note { font-size: 11px; color: var(--text-dim); text-align: center; margin-top: 15px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <h1>Lovely Beat</h1>
    
    <div class="search-box">
        <input type="text" id="songInput" placeholder="Paste YouTube Video URL or ID...">
        <button onclick="playSong()">PLAY</button>
    </div>

    <div class="player-box">
        <!-- Direct embed stream placeholder -->
        <iframe id="youtubePlayer" src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=0&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
    
    <div id="currentTrack" class="status-text">Now Playing Default Premium Beat</div>
    
    <div class="info-note">
        <strong>Tip:</strong> YouTube ne restrictions lagayi hain, isliye kisi bhi gaane ko chalane ke liye YouTube app/web se us song ka <strong>Link (URL) copy karke</strong> upar box mein paste karein aur PLAY dabayein!
    </div>
</div>

<script>
    function playSong() {
        const input = document.getElementById('songInput').value.trim();
        const player = document.getElementById('youtubePlayer');
        const status = document.getElementById('currentTrack');
        
        if(!input) {
            alert('Please enter a song link or ID!');
            return;
        }
        
        let videoId = '';
        
        // Extract ID from full URL if pasted
        if(input.includes('youtube.com/watch?v=')) {
            videoId = input.split('v=')[1].split('&')[0];
        } else if(input.includes('youtu.be/')) {
            videoId = input.split('youtu.be/')[1].split('?')[0];
        } else if(input.includes('youtube.com/embed/')) {
            videoId = input.split('/embed/')[1].split('?')[0];
        } else {
            // Assume it's a direct Video ID
            videoId = input;
        }
        
        if(videoId) {
            // Load direct video format which bypasses search playlist restrictions
            player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
            status.innerText = "Streaming Loaded Track...";
        } else {
            alert('Invalid YouTube URL!');
        }
    }
</script>

</body>
</html>
