<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVELY BEAT - Premium MP3 Player</title>
    <style>
        :root {
            --primary: #00ffcc;
            --primary-glow: rgba(0, 255, 204, 0.4);
            --bg: #06060c;
            --panel: #111122;
            --text: #ffffff;
            --text-dim: #6c6c8c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .mp3-container { width: 100%; max-width: 400px; background: var(--panel); border-radius: 30px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        h1 { font-size: 22px; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; text-shadow: 0 0 10px var(--primary-glow); }
        
        /* Vinyl Disk Spinner */
        .disk-wrapper { position: relative; width: 180px; height: 180px; margin: 0 auto 25px; }
        .vinyl-disk { width: 100%; height: 100%; background: radial-gradient(circle, #222 20%, #050505 60%, #111 100%); border-radius: 50%; border: 4px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; animation: spin 4s linear infinite; animation-play-state: paused; }
        .disk-center { width: 40px; height: 40px; background: var(--primary); border-radius: 50%; border: 5px solid #111; box-shadow: 0 0 10px var(--primary); }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .track-info { margin-bottom: 25px; }
        .track-title { font-size: 18px; font-weight: 600; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 14px; color: var(--text-dim); }

        /* Custom Progress Bar */
        .progress-container { width: 100%; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-dim); }
        .progress-bar { flex: 1; -webkit-appearance: none; appearance: none; height: 6px; background: #22223c; border-radius: 3px; outline: none; cursor: pointer; }
        .progress-bar::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 8px var(--primary); cursor: pointer; }

        /* Audio Controls UI */
        .controls { display: flex; justify-content: center; align-items: center; gap: 30px; margin-bottom: 25px; }
        .control-btn { background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; transition: 0.2s; }
        .control-btn:hover { color: var(--primary); }
        .play-btn { width: 60px; height: 60px; background: var(--primary); color: #000; border-radius: 50%; font-size: 24px; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 15px var(--primary-glow); }
        .play-btn:hover { transform: scale(1.05); box-shadow: 0 0 25px var(--primary); }

        /* Playlist Grid */
        .playlist-title { text-align: left; font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .playlist { display: flex; flex-direction: column; gap: 10px; max-height: 150px; overflow-y: auto; padding-right: 5px; }
        .playlist::-webkit-scrollbar { width: 4px; }
        .playlist::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
        
        .track-item { display: flex; justify-content: space-between; align-items: center; background: #18182c; padding: 12px 15px; border-radius: 12px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; text-align: left; }
        .track-item:hover { border-color: var(--primary); background: #1e1e36; }
        .track-item.active { background: rgba(0, 255, 204, 0.1); border-color: var(--primary); color: var(--primary); }
    </style>
</head>
<body>

<div class="mp3-container">
    <h1>Lovely Beat MP3</h1>
    
    <div class="disk-wrapper">
        <div class="vinyl-disk" id="vinylDisk">
            <div class="disk-center"></div>
        </div>
    </div>

    <div class="track-info">
        <div class="track-title" id="playerTitle">Select a Track</div>
        <div class="track-artist" id="playerArtist">Premium Audio Stream</div>
    </div>

    <div class="progress-container">
        <span id="currentTime">0:00</span>
        <input type="range" class="progress-bar" id="progressBar" value="0" min="0" max="100">
        <span id="duration">0:00</span>
    </div>

    <div class="controls">
        <button class="control-btn" onclick="prevTrack()">⏮</button>
        <button class="control-btn play-btn" id="playBtn" onclick="togglePlay()">▶</button>
        <button class="control-btn" onclick="nextTrack()">⏭</button>
    </div>

    <div class="playlist-title">Exclusive Playlist</div>
    <div class="playlist" id="playlistContainer">
        <!-- Tracks loaded dynamically -->
    </div>
</div>

<audio id="mainAudio" src=""></audio>

<script>
    // Premium royalty-free standalone high-speed audio streams (Bypasses YouTube entirely)
    const trackList = [
        { title: "Cyberpunk Synthwave Beat", artist: "Lovely Sekhon Production", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
        { title: "Premium HipHop Bass", artist: "Lovely Sekhon Exclusive", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
        { title: "Lo-Fi Midnight Chill", artist: "Lovely Sekhon Lofi", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3" },
        { title: "EDM Festival Anthem", artist: "Lovely Sekhon Club Mix", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" }
    ];

    let currentTrackIndex = 0;
    const audio = document.getElementById('mainAudio');
    const playBtn = document.getElementById('playBtn');
    const disk = document.getElementById('vinylDisk');
    const progressBar = document.getElementById('progressBar');
    const currentTimeEl = document.getElementById('currentTime');
    const durationEl = document.getElementById('duration');

    // Load Playlist UI
    function initPlaylist() {
        const container = document.getElementById('playlistContainer');
        container.innerHTML = '';
        trackList.forEach((track, index) => {
            const item = document.createElement('div');
            item.className = `track-item ${index === currentTrackIndex ? 'active' : ''}`;
            item.onclick = () => loadTrack(index, true);
            item.innerHTML = `<div><strong>${track.title}</strong><br><small style="color:var(--text-dim)">${track.artist}</small></div><span>▶</span>`;
            container.appendChild(item);
        });
    }

    function loadTrack(index, autoPlay = false) {
        currentTrackIndex = index;
        const track = trackList[currentTrackIndex];
        audio.src = track.url;
        document.getElementById('playerTitle').innerText = track.title;
        document.getElementById('playerArtist').innerText = track.artist;
        
        // Refresh active styles
        initPlaylist();

        if (autoPlay) {
            audio.play();
            playBtn.innerText = "⏸";
            disk.style.animationPlayState = "running";
        } else {
            playBtn.innerText = "▶";
            disk.style.animationPlayState = "paused";
        }
    }

    function togglePlay() {
        if (audio.paused) {
            audio.play();
            playBtn.innerText = "⏸";
            disk.style.animationPlayState = "running";
        } else {
            audio.pause();
            playBtn.innerText = "▶";
            disk.style.animationPlayState = "paused";
        }
    }

    function nextTrack() {
        let next = currentTrackIndex + 1;
        if (next >= trackList.length) next = 0;
        loadTrack(next, true);
    }

    function prevTrack() {
        let prev = currentTrackIndex - 1;
        if (prev < 0) prev = trackList.length - 1;
        loadTrack(prev, true);
    }

    // Progress bar calculations
    audio.addEventListener('timeupdate', () => {
        if (audio.duration) {
            const progress = (audio.currentTime / audio.duration) * 100;
            progressBar.value = progress;
            
            // Format time
            let curMins = Math.floor(audio.currentTime / 60);
            let curSecs = Math.floor(audio.currentTime % 60);
            let durMins = Math.floor(audio.duration / 60);
            let durSecs = Math.floor(audio.duration % 60);
            
            if (curSecs < 10) curSecs = "0" + curSecs;
            if (durSecs < 10) durSecs = "0" + durSecs;
            
            currentTimeEl.innerText = `${curMins}:${curSecs}`;
            durationEl.innerText = `${durMins}:${durSecs}`;
        }
    });

    progressBar.addEventListener('input', () => {
        const seekTime = (progressBar.value / 100) * audio.duration;
        audio.currentTime = seekTime;
    });

    audio.addEventListener('ended', nextTrack);

    // Bootstrap first load
    loadTrack(0, false);
</script>

</body>
</html>
