<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVELY BEAT 159 - RESSO EXPERIENCE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a0a12;
            --primary-neon: #00ffcc;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --card-bg: rgba(255, 255, 255, 0.07);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        /* Full Screen Phone View Wrapper for Resso Setup */
        .resso-container { width: 100%; max-width: 450px; height: 100vh; background: linear-gradient(180deg, #12122c 0%, #05050a 100%); position: relative; display: flex; flex-direction: column; overflow: hidden; }

        /* Top Bar with Search Embedded Engine */
        .top-search-bar { position: absolute; top: 20px; left: 0; width: 100%; padding: 0 20px; z-index: 10; display: flex; gap: 10px; }
        .top-search-bar input { flex: 1; background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255,255,255,0.1); padding: 12px 20px; border-radius: 25px; color: #fff; font-size: 14px; outline: none; backdrop-filter: blur(10px); }
        .top-search-bar input:focus { border-color: var(--primary-neon); }
        .top-search-bar button { background: var(--primary-neon); color: #000; border: none; width: 45px; height: 45px; border-radius: 50%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; box-shadow: 0 4px 12px rgba(0, 255, 204, 0.3); }

        /* Background Video Wrapper (Invisible Video, Audible Sound Engine) */
        .hidden-engine { position: absolute; top: -9999px; left: -9999px; width: 1px; height: 1px; visibility: hidden; }

        /* Resso Main Immersive Album Art Player Interface */
        .player-disk-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 20px; text-align: center; }
        
        .album-art-wrapper { width: 260px; height: 260px; border-radius: 50%; border: 4px solid rgba(255, 255, 255, 0.05); padding: 10px; background: rgba(255, 255, 255, 0.02); animation: spin 20s linear infinite; animation-play-state: paused; margin-bottom: 40px; box-shadow: 0 0 40px rgba(0,0,0,0.6); }
        .album-art-wrapper.playing { animation-play-state: running; border-color: var(--primary-neon); box-shadow: 0 0 30px rgba(0, 255, 204, 0.2); }
        .album-art-wrapper img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Song Description Meta info overlay */
        .song-meta { margin-bottom: 30px; width: 100%; padding: 0 20px; }
        .song-meta h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.5px; }
        .song-meta p { font-size: 14px; color: var(--primary-neon); font-weight: 500; }

        /* Dynamic Visualizer Waveform Simulators */
        .visualizer-container { display: flex; gap: 4px; height: 30px; align-items: flex-end; margin-bottom: 40px; }
        .bar { width: 3px; height: 5px; background-color: var(--primary-neon); border-radius: 2px; transition: 0.2s; }
        
        /* Bottom Audio Management System Dashboard Controls */
        .controls-panel { width: 100%; padding: 30px 20px 40px 20px; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); display: flex; flex-direction: column; gap: 20px; align-items: center; }
        
        /* ProgressBar Control Scrubber element */
        .scrubber-box { width: 100%; display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-dim); }
        .progress-bar-bg { flex: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; cursor: pointer; position: relative; }
        .progress-bar-current { width: 0%; height: 100%; background: var(--primary-neon); border-radius: 2px; position: absolute; top: 0; left: 0; }

        .buttons-row { display: flex; align-items: center; gap: 35px; width: 100%; justify-content: center; }
        .btn-secondary { background: none; border: none; color: #fff; font-size: 18px; cursor: pointer; opacity: 0.7; transition: 0.2s; }
        .btn-secondary:hover { opacity: 1; color: var(--primary-neon); }
        .btn-main-play { width: 65px; height: 65px; border-radius: 50%; background: #fff; border: none; color: #000; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; box-shadow: 0 4px 15px rgba(255,255,255,0.2); }
        .btn-main-play:hover { transform: scale(1.05); background: var(--primary-neon); }
    </style>
</head>
