<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVELY BEAT - Premium Music</title>
    <style>
        :root {
            --primary: #00ffcc;
            --bg-dark: #0a0a12;
            --card-bg: #131324;
            --btn-bg: #1f1f38;
            --text-main: #ffffff;
            --text-dim: #8b8ba7;
        }
        * { box-shadow: none; box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 480px; background: var(--card-bg); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); }
        h1 { font-size: 26px; text-align: center; margin-bottom: 20px; color: var(--primary); letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 10px rgba(0,255,204,0.3); }
        
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: #0a0a12; color: #fff; font-size: 15px; outline: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,255,204,0.2); }
        .search-box button { background: var(--primary); color: #000; border: none; padding: 0 22px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 15px; }

        .player-box { width: 100%; height: 240px; background: #000; border-radius: 16px; overflow: hidden; margin-bottom: 20px; border: 2px solid var(--primary); box-shadow: 0 0 15px rgba(0,255,204,0.1); }
        iframe { width: 100%; height: 100%; border: none; }
        
        .section-title { font-size: 14px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; font-weight: 600; }
        .genre-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .genre-btn { background: var(--btn-bg); color: #fff; border: 1px solid rgba(255,255,255,0.05); padding: 14px; border-radius: 12px; font-size: 14px; font-weight: 500; cursor: pointer; text-align: center; transition: 0.2s; }
        .genre-btn:hover { background: var(--primary); color: #000; font-weight: bold; transform: translateY(-2px); }
        
        .status-text { text-align: center; font-size: 14px; color: var(--primary); margin-top: 5px; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <h1>Lovely Beat</h1>
    
    <div class="search-box">
        <input type="text" id="songInput" placeholder="Gaane ya Artist ka naam likho...">
        <button onclick="searchAndPlay()">SEARCH</button>
    </div>

    <div class="player-box">
        <!-- New clean automation embed player -->
        <iframe id="youtubePlayer" src="https://www.youtube.com/embed?playlist=dQw4w9WgXcQ&autoplay=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
    
    <div id="currentTrack" class="status-text">Ready to Play Premium Beats</div>
    <br>

    <div class="section-title">Quick Genres</div>
    <div class="genre-grid">
        <button class="genre-btn" onclick="playGenre('Punjabi Hits New Song')">🎵 Punjabi Hits</button>
        <button class="genre-btn" onclick="playGenre('Bhojpuri Dhamaka New Song')">💥 Bhojpuri Dhamaka</button>
        <button class="genre-btn" onclick="playGenre('Haryanvi Yo Yo New Song')">🔥 Haryanvi Top</button>
        <button class="genre-btn" onclick="playGenre('Bollywood Romantic New Song')">❤️ Bollywood Hit</button>
    </div>
</div>

<script>
    // YouTube auto-search stream loader fixing the "unavailable" bug
    function loadMusic(query) {
        const player = document.getElementById('youtubePlayer');
        const status = document.getElementById('currentTrack');
        
        // Bypassing YouTube restriction using embed search indexing
        const cleanQuery = encodeURIComponent(query);
        player.src = `https://www.youtube.com/embed?listType=search&list=${cleanQuery}&autoplay=1`;
        
        status.innerText = `Playing: ${query}`;
    }

    function searchAndPlay() {
        const query = document.getElementById('songInput').value.trim();
        if(!query) {
            alert('Pehle gaane ka naam toh likho bhai!');
            return;
        }
        loadMusic(query);
    }

    function playGenre(genreName) {
        loadMusic(genreName);
    }
    
    // Allow enter key press to search
    document.getElementById('songInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            searchAndPlay();
        }
    });
</script>

</body>
</html>
